---
# Install NGINX Ingress Controller first with:
# helm repo add ingress-nginx https://kubernetes.github.io/ingress-nginx
# helm repo update
# helm install nginx-ingress ingress-nginx/ingress-nginx --namespace ingress-nginx --create-namespace

# Ingress for Team Alpha
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: openclaw-alpha-ingress
  namespace: openclaw-alpha
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
spec:
  ingressClassName: nginx
  tls:
  - hosts:
    - alpha.openclaw.yourdomain.com
    secretName: openclaw-alpha-tls
  rules:
  - host: alpha.openclaw.yourdomain.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: openclaw-alpha-service
            port:
              number: 80
