---
# Service Account for Team Alpha
apiVersion: v1
kind: ServiceAccount
metadata:
  name: openclaw-alpha-sa
  namespace: openclaw-alpha
---
# Role for Team Alpha (namespace-scoped permissions)
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: openclaw-alpha-role
  namespace: openclaw-alpha
rules:
- apiGroups: ["", "apps", "batch"]
  resources: ["pods", "services", "deployments", "jobs", "configmaps", "secrets"]
  verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
- apiGroups: [""]
  resources: ["pods/log"]
  verbs: ["get", "list"]
---
# RoleBinding for Team Alpha
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: openclaw-alpha-rolebinding
  namespace: openclaw-alpha
subjects:
- kind: ServiceAccount
  name: openclaw-alpha-sa
  namespace: openclaw-alpha
roleRef:
  kind: Role
  name: openclaw-alpha-role
  apiGroup: rbac.authorization.k8s.io
---
