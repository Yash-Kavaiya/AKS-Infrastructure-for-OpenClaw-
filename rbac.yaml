---
# NetworkPolicy for Team Alpha (isolate namespace traffic)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: openclaw-alpha-netpol
  namespace: openclaw-alpha
spec:
  podSelector:
    matchLabels:
      app: openclaw
      team: alpha
  policyTypes:
  - Ingress
  - Egress
  ingress:
  - from:
    - namespaceSelector:
        matchLabels:
          name: ingress-nginx
    - podSelector:
        matchLabels:
          app: openclaw
          team: alpha
    ports:
    - protocol: TCP
      port: 8080
  egress:
  - to:
    - namespaceSelector: {}
    ports:
    - protocol: TCP
      port: 443
    - protocol: TCP
      port: 80
  - to:
    - namespaceSelector:
        matchLabels:
          name: kube-system
    ports:
    - protocol: UDP
      port: 53
